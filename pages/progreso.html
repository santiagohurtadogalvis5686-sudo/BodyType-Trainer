<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Evaluación corporal</title>

    <link rel="icon" type="image/png" href="../src/static/icono.ico">

    <link rel="stylesheet" href="../src/styles/progreso.css">

</head>

<body>

<div class="fondo">

    <div class="contenedor">

        <h1>📈 Evaluación</h1>

        <h2 id="bienvenida">👤 Bienvenido</h2>

        <form id="formProgreso">

            <div class="campo">

                <label for="genero">
                    Digite su género (Hombre/Mujer)
                </label>

                <input
                    type="text"
                    id="genero"
                    name="genero"
                    autocomplete="off">

            </div>

            <div class="campo">

                <label for="cuello">
                    ¿Cuánto mide su cuello? (cm)
                </label>

                <input
                    type="number"
                    step="0.01"
                    id="cuello"
                    name="cuello">

            </div>

            <div class="campo">

                <label for="cintura">
                    ¿Cuánto mide su cintura? (cm)
                </label>

                <input
                    type="number"
                    step="0.01"
                    id="cintura"
                    name="cintura">

            </div>

            <div
                class="campo"
                id="campoCadera"
                style="display:none;">

                <label for="cadera">
                    ¿Cuánto mide su cadera? (cm)
                </label>

                <input
                    type="number"
                    step="0.01"
                    id="cadera"
                    name="cadera">

            </div>

            <div class="campo">

                <label for="altura">
                    ¿Cuánto mide? (m)
                </label>

                <input
                    type="number"
                    step="0.01"
                    id="altura"
                    name="altura">

            </div>

            <div class="campo">

                <label for="peso">
                    ¿Cuál es su peso? (kg)
                </label>

                <input
                    type="number"
                    step="0.01"
                    id="peso"
                    name="peso">

            </div>

            <div class="campo">

                <label for="edad">
                    Digite su edad
                </label>

                <input
                    type="number"
                    id="edad"
                    name="edad">

            </div>

            <div class="campo">

                <label for="entrenamiento">
                    ¿Cuántos días a la semana entrena?
                </label>

                <input
                    type="number"
                    id="entrenamiento"
                    name="entrenamiento"
                    min="0"
                    max="7">

            </div>

            <div class="botones">

                <button
                    type="submit">

                    Calcular

                </button>

                <button
                    type="button"
                    onclick="history.back()">

                    Regresar

                </button>

            </div>

        </form>

    </div>

</div>

<script src="../src/hook/progreso.js"></script>

</body>

</html>
