<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyType Trainer</title>

    <link rel="icon" type="image/png" href="/static/img/icono.ico">


    <link rel="stylesheet" href="/static/styles/index.css">
</head>
<body>

    <!-- Pantalla de inicio de sesión -->
    <section id="login">

         <img
            src="/static/img/login_mejor.png"
            alt="Logo"
            class="logo">

        <h1>BodyType Trainer</h1>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                name="usuario"
                placeholder="Usuario"
                required>

            <input
                type="password"
                id="contrasena"
                name="contrasena"
                placeholder="Contraseña"
                required>

            <button type="submit">
                Iniciar sesión
            </button>

            <button type="button" id="btnRegistro">
                Registrarse
            </button>
            <p class="registro">
                ¿No tienes una cuenta?
            </p>
        </form>

        <p id="mensaje"></p>

    </section>


    <!-- Pantalla de selección de cuerpo -->
    <section id="seleccionCuerpo" hidden>

        <h2>Seleccione su tipo de cuerpo 💪</h2>

        <div id="tiposCuerpo">

    <div class="tipo" id="ectomorfo" data-info="Estructura delgada, metabolismo rápido, dificultad para ganar grasa y músculo.">
        <img src="/static/img/ectomorfo.png" alt="Ectomorfo">
        <h3>Ectomorfo</h3>
    </div>

    <div class="tipo" id="mesomorfo" data-info="Estructura atlética, gana músculo con facilidad, metabolismo eficiente y buena postura.">
        <img src="/static/img/mesomorfo.png" alt="Mesomorfo">
        <h3>Mesomorfo</h3>
    </div>

    <div class="tipo" id="endomorfo" data-info="Estructura robusta, metabolismo lento, tendencia a almacenar grasa y facilidad para ganar fuerza.">
        <img src="/static/img/endomorfo.png" alt="Endomorfo">
        <h3>Endomorfo</h3>
    </div>

</div>

        <div id="acciones">

            <button id="btnNuevaEvaluacion">
                Nueva evaluación
            </button>

            <button id="btnProgreso">
                Mi progreso
            </button>

            <button id="btnCerrarSesion">
                Cerrar sesión
            </button>

        </div>

    </section>

    <script src="/static/js/index.js"></script>

</body>
</html>
